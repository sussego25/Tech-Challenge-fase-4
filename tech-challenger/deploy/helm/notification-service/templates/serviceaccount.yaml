apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "notification-service.serviceAccountName" . }}
  labels:
    app.kubernetes.io/name: {{ include "notification-service.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}

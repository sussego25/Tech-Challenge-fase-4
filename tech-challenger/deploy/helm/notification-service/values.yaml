nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/notification-service
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "notification-service"
  annotations:
    # IRSA: adicionar ARN da role IAM do notification-service quando disponivel
    eks.amazonaws.com/role-arn: ""

env:
  AWS_REGION: us-east-1
  KAFKA_BOOTSTRAP_SERVERS: ""
  KAFKA_TOPIC_ANALYSIS_COMPLETED: "analysis-completed"
  KAFKA_GROUP_ID: "notification-service"
  DYNAMODB_TABLE: ""

# Nome de um Secret existente com variaveis sensiveis (opcional)
existingSecretName: ""
secretEnv: []

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

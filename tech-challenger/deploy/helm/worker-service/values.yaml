nameOverride: ""
fullnameOverride: ""

replicaCount: 1

image:
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/worker-service
  tag: latest
  pullPolicy: IfNotPresent

serviceAccount:
  create: true
  name: "worker-service"
  annotations:
    # IRSA: role criada pelo modulo infra/eks/terraform/iam
    eks.amazonaws.com/role-arn: ""

env:
  AWS_REGION: us-east-1
  SQS_QUEUE_URL: ""
  S3_BUCKET: ""
  DYNAMODB_TABLE: ""
  KAFKA_BOOTSTRAP_SERVERS: ""
  KAFKA_TOPIC_ANALYSIS_COMPLETED: "analysis-completed"
  SAGEMAKER_ENDPOINT: ""

# Nome de um Secret existente com variaveis sensiveis (opcional)
existingSecretName: ""
secretEnv: []
# Exemplo:
# secretEnv:
#   - name: AWS_SECRET_ACCESS_KEY
#     key: aws_secret_access_key

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

nodeSelector: {}
tolerations: []
affinity: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

livenessProbe:
  enabled: false

readinessProbe:
  enabled: false
